kind = "web"
previewPath = "/"
title = "EV Showroom"
version = "1.0.0"
id = "artifacts/ev-showroom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24321

[services.development]
run = "pnpm --filter @workspace/ev-showroom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ev-showroom", "run", "build" ]
publicDir = "artifacts/ev-showroom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24321"
BASE_PATH = "/"
